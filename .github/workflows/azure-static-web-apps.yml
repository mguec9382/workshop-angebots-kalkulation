name: Deploy to Azure Static Web Apps

# Baut die Vite-App und veroeffentlicht sie in Azure Static Web Apps.
# Voraussetzung: Im GitHub-Repo unter Settings -> Secrets and variables -> Actions
# ein Secret AZURE_STATIC_WEB_APPS_API_TOKEN mit dem Deployment-Token der
# Azure Static Web App hinterlegen (bekommst du beim Anlegen der App im Azure-Portal).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Speicherort der App-Quellen (Repo-Root)
          app_location: '/'
          # Kein separates API-Backend
          api_location: ''
          # Fertiges Build-Ergebnis von Vite
          output_location: 'dist'

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
